name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="${{ github.ref_name }}" 2>/dev/null || echo "")
          {
            if [ -n "$PREV_TAG" ]; then
              echo "## 更新日志 ($PREV_TAG → ${{ github.ref_name }})"
              echo ""
              git log --oneline --no-decorate "${PREV_TAG}..HEAD" | sed 's/^/- /'
            else
              echo "## 首次发布"
              echo ""
              git log --oneline --no-decorate | sed 's/^/- /'
            fi
          } > changelog.md
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          cat changelog.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Termax ${{ github.ref_name }}'
          releaseBody: |
            ## Termax ${{ github.ref_name }}

            下载 `Termax_*.exe` 安装包，双击运行即可安装。无需管理员权限，支持自定义安装目录。

            ${{ env.CHANGELOG }}
          releaseDraft: false
          prerelease: false
          args: '--bundles nsis'
